<p-toast />

<div class="min-h-screen bg-gray-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 pt-36">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-md">
    <div>
      <h2 class="text-center text-3xl font-bold text-gray-900 mb-2">Quên mật khẩu</h2>
      <p class="text-center text-sm text-gray-600" *ngIf="step === 'email'">
        Nhập email đã đăng ký để nhận mã đặt lại mật khẩu
      </p>
      <p class="text-center text-sm text-gray-600" *ngIf="step === 'reset'">
        Nhập mã OTP và mật khẩu mới cho {{ email }}
      </p>
    </div>

    <!-- Bước 1: nhập email -->
    <form class="mt-8 space-y-6" (ngSubmit)="onSendOtp()" *ngIf="step === 'email'">
      <div class="space-y-4">
        <div>
          <label for="fpEmail" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="fpEmail" name="fpEmail" type="email" [(ngModel)]="email" required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Nhập email của bạn" />
        </div>
      </div>

      <p *ngIf="resetError" class="text-sm text-red-500">{{ resetError }}</p>

      <div>
        <button type="submit" [disabled]="!email || isSubmittingEmail"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isSubmittingEmail ? 'Đang gửi...' : 'Gửi mã đặt lại mật khẩu' }}
        </button>
      </div>

      <div class="text-center">
        <a routerLink="/login" class="text-sm font-medium text-blue-600 hover:text-blue-500">Quay lại đăng nhập</a>
      </div>
    </form>

    <!-- Bước 2: OTP + mật khẩu mới -->
    <form class="mt-8 space-y-6" (ngSubmit)="onResetPassword()" *ngIf="step === 'reset'">
      <div class="space-y-4">
        <div>
          <label for="fpOtp" class="block text-sm font-medium text-gray-700 mb-1">Mã OTP</label>
          <input id="fpOtp" name="fpOtp" type="text" [(ngModel)]="otp" required maxlength="6"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent tracking-widest text-center"
            placeholder="Nhập mã 6 số" />
          <button type="button" (click)="onResendOtp()" [disabled]="isResendingOtp"
            class="text-xs text-blue-600 hover:text-blue-500 mt-1">
            {{ isResendingOtp ? 'Đang gửi lại...' : 'Gửi lại mã OTP' }}
          </button>
        </div>

        <div>
          <label for="fpNewPassword" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
          <input id="fpNewPassword" name="fpNewPassword" type="password" [(ngModel)]="newPassword" required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)" />
        </div>

        <div>
          <label for="fpConfirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu mới</label>
          <input id="fpConfirmPassword" name="fpConfirmPassword" type="password" [(ngModel)]="confirmPassword" required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Nhập lại mật khẩu mới" />
        </div>
      </div>

      <p *ngIf="resetError" class="text-sm text-red-500">{{ resetError }}</p>

      <div>
        <button type="submit" [disabled]="isResetting"
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isResetting ? 'Đang xử lý...' : 'Đặt lại mật khẩu' }}
        </button>
      </div>

      <div class="text-center">
        <button type="button" (click)="backToEmail()" class="text-sm font-medium text-blue-600 hover:text-blue-500">
          Thay đổi email
        </button>
      </div>
    </form>
  </div>
</div>

<app-otp-popup
  [visible]="showOtpPopup"
  [email]="email"
  [title]="'Xác thực đặt lại mật khẩu'"
  [isResending]="isResendingOtp"
  [errorMessage]="otpError"
  [successMessage]="otpSuccess"
  [countdown]="countdown"
  (verify)="onVerifyOtp($event)"
  (resend)="onResendOtp()">
</app-otp-popup>
