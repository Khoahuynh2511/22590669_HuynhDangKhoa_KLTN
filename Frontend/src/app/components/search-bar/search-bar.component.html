<div class="search-container">
  @if (showTabs) {
    <div class="search-tabs">
      <button
        type="button"
        class="tab-btn"
        [class.active]="searchType === 'hotel'"
        (click)="switchSearchType('hotel')">
        Khách sạn
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="searchType === 'tour'"
        (click)="switchSearchType('tour')">
        Tour du lịch
      </button>
    </div>
  }

  @if (searchType === 'hotel') {
    <div class="hotel-search-wrapper">
      <div class="hotel-search-grid">
        <div class="search-field">
          <label class="field-label">Địa điểm</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-location-dot field-icon"></i>
            <input
              type="text"
              [(ngModel)]="hotelSearchObj.name"
              placeholder="Hồ Chí Minh, Đà Nẵng, Nha Trang..."
              class="field-input"
              (keydown.enter)="bindSearch()" />
          </div>
        </div>

        <div class="search-field">
          <label class="field-label">Nhận phòng</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-calendar field-icon"></i>
            <input
              type="date"
              [(ngModel)]="hotelSearchObj.checkIn"
              [min]="minDate"
              (change)="onCheckInChange()"
              class="field-input" />
          </div>
        </div>

        <div class="search-field">
          <label class="field-label">Trả phòng</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-calendar field-icon"></i>
            <input
              type="date"
              [(ngModel)]="hotelSearchObj.checkOut"
              [min]="minCheckOutDate"
              class="field-input" />
          </div>
        </div>

        <div class="search-field search-field-sm">
          <label class="field-label">Khách</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-users field-icon"></i>
            <input
              type="number"
              [(ngModel)]="hotelSearchObj.guests"
              min="1"
              max="20"
              class="field-input" />
          </div>
        </div>

        <div class="search-field search-field-sm">
          <label class="field-label">Phòng</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-bed field-icon"></i>
            <input
              type="number"
              [(ngModel)]="hotelSearchObj.rooms"
              min="1"
              max="10"
              class="field-input" />
          </div>
        </div>

        <div class="search-field search-action">
          <label class="field-label field-label-hidden">Tìm kiếm</label>
          <button type="button" class="hotel-search-btn" (click)="bindSearch()">
            Tìm khách sạn
          </button>
        </div>
      </div>
    </div>
  } @else {
    <div class="tour-search-wrapper">
      <div class="ai-promotion-section">
        <div class="ai-badge-content">
          <div class="ai-icon-wrapper">
            <i class="fas fa-robot"></i>
          </div>
          <div class="ai-text">
            <div class="ai-title">Tìm kiếm thông minh với AI</div>
            <div class="ai-subtitle">Trợ lý AI sẽ gợi ý tour phù hợp nhất dành cho bạn</div>
          </div>
          <button type="button" class="ai-cta-btn" (click)="openAIChatbot()" title="Trò chuyện với AI">
            <span>Thử ngay</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div class="search-input-container">
        <div class="search-input-wrapper">
          <div class="search-icon">
            <i class="fas fa-search"></i>
          </div>
          <input
            type="text"
            [(ngModel)]="queryText"
            placeholder="Ví dụ: Tour Đà Lạt 3 ngày 2 đêm, giá dưới 5 triệu..."
            class="search-input-field"
            (keydown.enter)="bindSearch()" />
          <button type="button" class="search-submit-btn" (click)="bindSearch()">
            <span>Tìm tour</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <div class="quick-tips">
        <div class="tip-item">
          <i class="fas fa-lightbulb"></i>
          <span>Mô tả chi tiết để được gợi ý chính xác hơn</span>
        </div>
        <div class="tip-item">
          <i class="fas fa-magic"></i>
          <span>Có thể hỏi về điểm đến, thời gian, ngân sách</span>
        </div>
      </div>
    </div>
  }
</div>
