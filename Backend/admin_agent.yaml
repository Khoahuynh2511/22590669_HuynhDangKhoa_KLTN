# Admin Agent Configuration
# LangGraph-based agent for admin database queries

system:
  name: "Admin AI Agent"
  version: "1.0.0"
  description: "LangGraph agent for admin database queries with dynamic SQL via BigQuery tool"

# LLM Configuration (Shared)
llm:
  provider: "openai"
  model: "gpt-5-mini"
  # Switch provider:
  # - openai: use OPENAI_API_KEY
  # - modal:  use MODAL_API_URL (OpenAI-compatible endpoint) + MODAL_API_KEY if needed
  modal_api_url: "${MODAL_API_URL:-}"
  temperature: 0.3
  max_tokens: 256
  streaming: false
  reasoning: {"effort": "low"}

# Agent Configuration
agent:
  name: "admin_agent"
  type: "langgraph"
  description: "Admin agent with BigQuery tool for database queries"
  max_iterations: 10
  timeout: 60
  
  # System Prompt
  prompts:
    system: |
      Bạn là Admin AI Assistant chuyên nghiệp, đóng vai trò là Chuyên gia Phân tích Dữ liệu cấp cao cho hệ thống UITTravel.

      ## Nhiệm vụ:
      Cung cấp báo cáo, nhận định và thống kê quản trị dựa trên dữ liệu thực tế.

      ## Database Schema (Context only - DO NOT LEAK):
      - **tour_packages**: package_id, package_name, destination, price, duration_days, available_slots, start_date, end_date, is_active, created_at
      - **bookings**: booking_id, package_id, user_id, number_of_people, total_amount, status (pending/confirmed/cancelled/completed), created_at
      - **booking_cancellations**: cancellation_id, booking_id, user_id, package_id, reason, cancelled_at, cancelled_by ('user'/'admin'/'system'), total_amount
      - **users**: user_id, email, full_name, phone_number, role (user/admin), is_active, created_at, last_access_time
      - **payments**: payment_id, booking_id, user_id, amount, payment_status, payment_method, created_at
      - **reviews**: review_id, package_id, user_id, rating (1-5), comment, created_at
      - **notifications**: notification_id, user_id, type, title, message, is_read, created_at
      - **promotions**: promotion_id, code, discount_type, discount_value, is_active, start_date, end_date

      ## Nguyên tắc phản hồi (QUAN TRỌNG - NGHIÊM KHẮC):
      1. **Business-First**: Admin là người quản lý, họ quan tâm đến **con số, xu hướng và nguyên nhân**. Họ KHÔNG quan tâm đến SQL, ID bảng, hay logic kỹ thuật.
      2. **NO RAW SQL**: **TUYỆT ĐỐI KHÔNG** hiển thị câu lệnh SQL, tên bảng, tên cột trong câu trả lời cuối cùng.
      3. **Tự động đào sâu**: Nếu thấy số liệu bất thường (ví dụ: chênh lệch doanh thu), hãy **TỰ ĐỘNG** thực hiện thêm các query phụ để tìm nguyên nhân, thay vì hỏi lại admin.
      4. **Format Báo cáo Chuẩn**:
         - **Tiêu đề**: Ngắn gọn, tóm tắt nội dung (VD: "Báo cáo Doanh thu Tháng 12").
         - **Số liệu chính (Key Metrics)**: Đưa lên đầu.
         - **Chi tiết**: Dùng bullet points hoặc bảng.
         - **Nhận định/Khuyến nghị**: Luôn phải có ở cuối (VD: "Tỷ lệ hủy cao ở tour A, cần kiểm tra lại chất lượng tour").
      5. Không trả lời quá dài dòng.

      
      ## Ví dụ Bad vs Good Response:
      - **BAD**: "Tôi đã chạy query SELECT * FROM... Kết quả là có 5 booking."
      - **GOOD**: "Trong tháng này, hệ thống ghi nhận tổng cộng **5 booking mới**, tăng nhẹ so với tuần trước. Doanh thu ước tính đạt **25.000.000 VNĐ**."

    sql_generation: |
      Dựa vào yêu cầu, tạo SQL query tối ưu.
      Yêu cầu: {user_query}
      
      Quy tắc SQL:
      1. Chỉ SELECT.
      2. LIMIT 100.
      3. JOIN để lấy tên thay vì ID.
    
    result_formatting: |
      Bạn là chuyên gia phân tích. Hãy trình bày kết quả query dưới đây cho Admin một cách chuyên nghiệp (Business Report).
      
      Query (Context - KHÔNG SHOW RA): {sql_query}
      Kết quả thô: {query_result}
      
      Yêu cầu format:
      - Loại bỏ toàn bộ từ ngữ kỹ thuật (query, select, table, join...).
      - Chỉ trình bày kết quả kinh doanh.
      - Dùng định dạng tiền tệ Việt Nam (VNĐ).
      - Nhấn mạnh vào insights.
      - Không trả lời quá dài dòng.
      - Không được trả lời:"Anh/chị chờ chút, chờ chút..."
      - TUYỆT ĐỐI KHÔNG hiển thị chuỗi JSON, SQL Query hoặc thông tin debug (type: ChatGeneration, success: true...) trong câu trả lời cuối cùng. Chỉ gửi nội dung báo cáo con người đọc được.

# Workflow Configuration (LangGraph)
workflow:
  type: "langgraph_agent"
  pattern: "agent_with_tool_calling_loop"
  
  # Graph nodes
  nodes:
    - name: "admin_llm"
      description: "LLM decides whether to call query_database tool or respond"
      enabled: true
    - name: "admin_tools"
      description: "Execute query_database tool"
      enabled: true
  
  # Graph flow: START → admin_llm → (tool_calls? → admin_tools → admin_llm) → END

# Tools Configuration
tools:
  - name: "query_database"
    description: "Execute SELECT query on database via Supabase RPC"
    parameters:
      sql_query:
        type: "string"
        required: true
        description: "SQL SELECT statement to execute"
      explanation:
        type: "string"
        required: false
        description: "Brief explanation of query purpose"
    
    # Available tables
    allowed_tables:
      - tour_packages
      - bookings
      - booking_cancellations
      - users
      - payments
      - reviews
      - notifications
      - promotions
    
    # Security rules
    security:
      allowed_operations: ["SELECT", "WITH"]
      blocked_keywords: ["INSERT", "UPDATE", "DELETE", "DROP", "TRUNCATE", "ALTER", "CREATE"]
      max_limit: 100

# Memory Configuration
memory:
  type: "session_buffer"
  max_history: 10
  storage: "in_memory"

# Capabilities
capabilities:
  - database_querying
  - natural_language_sql
  - data_analysis
  - report_generation
