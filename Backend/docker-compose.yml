version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai-assistant-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-assistant-backend
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      # Ưu tiên lấy key từ biến môi trường đã export trên host (không bake vào image)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_EXPORT: ${OPENAI_API_KEY_EXPORT:-}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Optional: Mount logs directory if needed
      - ./logs:/app/logs
    networks:
      - backend-network

volumes:
  redis-data:

networks:
  backend-network:
    driver: bridge
